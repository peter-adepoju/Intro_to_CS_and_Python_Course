  <script>
    window.QUIZ_DATA = {
    "questions":  [
                      {
                          "number":  1,
                          "correct":  "B",
                          "questionHtml":  "\u003cp\u003eWhat is the key difference between \u003ccode\u003eprint()\u003c/code\u003e and \u003ccode\u003ereturn\u003c/code\u003e inside a function?\u003c/p\u003e",
