                      {
                          "number":  1,

                                      ],
                          "explanationHtml":  "\u003cp\u003eWhen decrementing by 2 from an odd number, the value skips past 0 (5\u0026#226;†’3\u0026#226;†’1\u0026#226;†’-1\u0026#226;†’...). Using \u003ccode\u003en \u0026lt;= 0\u003c/code\u003e catches this; \u003ccode\u003en == 0\u003c/code\u003e never matches\u003c/p\u003e"

                                          },
                                          {
                                              "html":  "\u003cp\u003eThe recursive case reaches back TWO steps (\u003ccode\u003en-1\u003c/code\u003e and \u003ccode\u003en-2\u003c/code\u003e), so both \u003ccode\u003en == 0\u003c/code\u003e and \u003ccode\u003en == 1\u003c/code\u003e must be handled directly to anchor the recursion\u003c/p\u003e",

                      },

                          "correct":  "C",
                          "questionHtml":  "\u003cp\u003eWhat is the best first thing to check when your recursive function raises \u003ccode\u003eRecursionError\u003c/code\u003e on input that seems reasonable?\u003c/p\u003e",
